services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  backend:
    image: laravel-placeholder
    # This service will be configured by Cline
    environment:
      - DB_HOST=db
      - DB_DATABASE=mor_plomberie
      - DB_USERNAME=mor_admin
      - DB_PASSWORD=mor_password
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mor_plomberie
      POSTGRES_USER: mor_admin
      POSTGRES_PASSWORD: mor_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
